<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人效计算工具</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app-shell">
    <nav class="topbar">
        <a class="brand" href="/">人效计算</a>
        <div class="nav-links">
            <a href="/" class="{{ 'active' if request.path == '/' else '' }}">快照管理</a>
            <a href="/workers" class="{{ 'active' if request.path.startswith('/workers') else '' }}">人员名单</a>
            <a href="/hours" class="{{ 'active' if request.path.startswith('/hours') else '' }}">填写工时</a>
            <a href="/dashboard" class="{{ 'active' if request.path.startswith('/dashboard') else '' }}">人效看板</a>
            <a href="/settings" class="{{ 'active' if request.path.startswith('/settings') else '' }}">飞书配置</a>
        </div>
    </nav>
    <main class="content">
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        <div class="flash-container">
            {% for category, message in messages %}
            <div class="flash flash-{{ category }}">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </main>
    </div>
</body>
</html>
